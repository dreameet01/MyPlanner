<script>
// ── THEMES ──
const THEMES = [
  { id:'gray',  name:'Gray',  sw:['#e0e0e0','#1a1a1a'] },
  { id:'rose',  name:'Rose',  sw:['#e8c8c8','#7a3a3a'] },
  { id:'sage',  name:'Sage',  sw:['#c0d8c0','#3a5c3a'] },
  { id:'slate', name:'Slate', sw:['#c0c6dc','#2a3050'] },
  { id:'mauve', name:'Mauve', sw:['#cec0e4','#4a3470'] },
];
let currentTheme = localStorage.getItem('pl_theme') || 'gray';

function buildThemePanel() {
  const opts = document.getElementById('themeOptions');
  const dots = document.getElementById('paletteDots');
  opts.innerHTML = '';
  THEMES.forEach(t => {
    const div = document.createElement('div');
    div.className = 'theme-row' + (t.id===currentTheme?' active':'');
    div.onclick = () => applyTheme(t.id);
    div.innerHTML = `<div class="t-swatches">${t.sw.map(c=>`<div class="t-sw" style="background:${c}"></div>`).join('')}</div><span class="t-name">${t.name}</span>`;
    opts.appendChild(div);
  });
  const th = THEMES.find(t=>t.id===currentTheme);
  dots.innerHTML = th.sw.map(c=>`<div class="p-dot" style="background:${c};border:1px solid rgba(0,0,0,0.1)"></div>`).join('');
}
function applyTheme(id) {
  currentTheme = id;
  document.body.setAttribute('data-theme', id);
  localStorage.setItem('pl_theme', id);
  buildThemePanel();

const DAYS_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TODAY = new Date();
const TODAYSTR = fmtDs(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());

let S = {
  items:[], memos:[], orderMap:{}, doneArchiveOpen:{},
  curView:'list',
  listYear:TODAY.getFullYear(),

  yearViewYear:TODAY.getFullYear(),
  selDate:null, newType:'event', dateMode:'exact',

};

function fmtDs(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function fmtMo(y,m){ return `${y}-${String(m+1).padStart(2,'0')}`; }
function parseDs(s){ if(!s)return null; const[y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtLabel(s){
  if(s&&s.length===7){ const[y,m]=s.split('-').map(Number); return `${MONTHS_EN[m-1]} ${y}`; }
  const d=parseDs(s); if(!d)return '';
  return `${DAYS_EN[d.getDay()]}, ${MONTHS_SHORT[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function nowLabel(){
  const n=new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

function save(){ try{localStorage.setItem('pl_items',JSON.stringify(S.items)); localStorage.setItem('pl_memos',JSON.stringify(S.memos)); localStorage.setItem('pl_orderMap',JSON.stringify(S.orderMap||{})); localStorage.setItem('pl_done_archive_open',JSON.stringify(S.doneArchiveOpen||{}));}catch(e){} }

// Google Calendar 일정에는 완료 체크 필드가 없으므로, 일정 체크 상태는 별도 로컬 맵에 영구 보존한다.
const EVENT_DONE_MAP_KEY = 'pl_event_done_map_v1';
function getEventDoneMap(){
  try{
    const m = JSON.parse(localStorage.getItem(EVENT_DONE_MAP_KEY) || '{}');
    return (m && typeof m === 'object') ? m : {};
  }catch(e){ return {}; }
}
function saveEventDoneMap(map){
  try{ localStorage.setItem(EVENT_DONE_MAP_KEY, JSON.stringify(map || {})); }catch(e){}
}
function eventDoneKeys(item){
  if(!item || item.type !== 'event') return [];
  const keys = [];
  if(item.gId) keys.push('g:' + item.gId);
  if(item.id) keys.push('l:' + item.id);
  // 반복/기간/월헤더 등 Google이 다시 펼쳐 보낼 때도 최대한 같은 항목으로 인식하기 위한 보조 키
  if(item.recurringEventId && item.date) keys.push('r:' + item.recurringEventId + ':' + item.date);
  if(item.rawTitle && item.date) keys.push('t:' + item.rawTitle + ':' + item.date);
  if(item.title && item.date) keys.push('t:' + item.title + ':' + item.date);
  return [...new Set(keys.filter(Boolean))];
}
function eventDoneKey(item){
  return eventDoneKeys(item)[0] || '';
}
function getStoredEventDone(item, fallback=false){
  const keys = eventDoneKeys(item);
  if(!keys.length) return !!fallback;
  const map = getEventDoneMap();
  for(const key of keys){
    if(Object.prototype.hasOwnProperty.call(map, key)) return !!map[key];
  }
  return !!fallback;
}
function setStoredEventDone(item, done){
  const keys = eventDoneKeys(item);
  if(!keys.length) return;
  const map = getEventDoneMap();
  keys.forEach(key=>{ map[key] = !!done; });
  saveEventDoneMap(map);
}
function removeStoredEventDone(item){
  const keys = eventDoneKeys(item);
  if(!keys.length) return;
  const map = getEventDoneMap();
  keys.forEach(key=>delete map[key]);
  saveEventDoneMap(map);
}

function effectiveDone(item){
  if(!item) return false;
  if(item.type === 'event') return getStoredEventDone(item, !!item.done);
  return !!item.done;
}
function restoreStoredEventDoneToItems(){
  try{
    (S.items||[]).forEach(item=>{
      if(item && item.type==='event') item.done = getStoredEventDone(item, !!item.done);
    });
  }catch(e){}
}
function migrateEventDoneFromItems(){
  // 예전 버전에서 S.items 안의 done 값만 갖고 있던 일정 체크를 새 로컬 맵으로 옮긴다.
  try{
    (S.items||[]).forEach(item=>{
      if(item && item.type==='event' && item.done) setStoredEventDone(item, true);
    });
  }catch(e){}
}
function load(){
  try{

    if(ver !== '2'){

      localStorage.setItem('pl_ver','2');
    }
    const it=JSON.parse(localStorage.getItem('pl_items')); if(Array.isArray(it)){
      S.items=it.map(item=> item && item.repeat==='lunar' ? {...item, repeat:'yearly'} : item);
      migrateEventDoneFromItems();
      restoreStoredEventDoneToItems();
    }
    const me=JSON.parse(localStorage.getItem('pl_memos')); if(Array.isArray(me))S.memos=me;
    const om=JSON.parse(localStorage.getItem('pl_orderMap')); if(om&&typeof om==='object')S.orderMap=om;
    const dao=JSON.parse(localStorage.getItem('pl_done_archive_open')); if(dao&&typeof dao==='object')S.doneArchiveOpen=dao;
  }catch(e){}
}

function seedDemo(){
  // 데모 데이터 없음 - 구글 로그인 후 자동으로 불러옴

}

// ── ITEMS ──
const MONTH_TAG = '[이달]';
function hasMonthTag(title){ return (title||'').includes(MONTH_TAG); }
function stripMonthTag(title){ return (title||'').replace(MONTH_TAG,'').trim(); }
function monthKeyFromDate(dateStr){ return dateStr ? dateStr.slice(0,7) : ''; }
function firstDayOfMonth(monthStr){
  const [y,m] = monthStr.split('-').map(Number);
  if(!y||!m) return monthStr;
  return `${y}-${String(m).padStart(2,'0')}-01`;
}
function nextDayStr(dateStr){
  const d = parseDs(dateStr);
  if(!d) return dateStr;
  d.setDate(d.getDate()+1);
  return fmtDs(d.getFullYear(), d.getMonth(), d.getDate());
}
function prevDayStr(dateStr){
  const d = parseDs(dateStr);
  if(!d) return dateStr;
  d.setDate(d.getDate()-1);
  return fmtDs(d.getFullYear(), d.getMonth(), d.getDate());
}
function isRangeItem(item){ return !!(item && item.type==='event' && item.isRange && item.date && item.endDate); }
function isDateWithinRange(item, ds){
  if(!isRangeItem(item)) return item && item.date===ds;
  return ds >= item.date && ds <= item.endDate;
}
function cloneForDisplayDate(item, ds){
  if(!isRangeItem(item)) return item;
  return {...item, _displayDate:ds, _displayRange:true};
}
function rangeLabel(item){
  return isRangeItem(item) ? `${item.date} ~ ${item.endDate}` : '';
}

function rememberTimeBeforeMonthOnly(item){
  if(!item) return;
  if(!item.monthOnly && item.time){
    item._monthBackupTime = item.time;
  }
}
function moveItemToMonthOnly(item, monthKey){
  if(!item) return;
  rememberTimeBeforeMonthOnly(item);
  item.monthOnly = true;
  item.date = monthKey && monthKey.length===10 ? monthKey.slice(0,7) : monthKey;
  item.time = '';
}
function moveItemToExactDate(item, dateStr, explicitTime){
  if(!item) return;
  const wasMonthOnly = !!item.monthOnly;
  item.monthOnly = false;
  item.date = dateStr && dateStr.length===7 ? firstDayOfMonth(dateStr) : dateStr;
  if(explicitTime !== undefined && explicitTime !== null && explicitTime !== ''){
    item.time = explicitTime;
  } else if(wasMonthOnly && item._monthBackupTime){
    item.time = item._monthBackupTime;
  } else {
    item.time = explicitTime || '';
  }
}

function addMinutesToLocalDateTime(dateStr, timeStr, minutes){
  const [h,mi] = (timeStr||'00:00').split(':').map(Number);
  const d = parseDs(dateStr);
  if(!d) return dateStr + 'T' + timeStr + ':00';
  d.setHours(h||0, mi||0, 0, 0);
  d.setMinutes(d.getMinutes() + minutes);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:00`;
}
function normalizeRepeatValue(r){
  return (r === 'monthly' || r === 'yearly') ? r : 'none';
}
function recurrenceForRepeat(item){
  const r = normalizeRepeatValue(item?.repeat);
  if(r==='monthly') return ['RRULE:FREQ=MONTHLY'];
  if(r==='yearly') return ['RRULE:FREQ=YEARLY'];
  return null;
}
function repeatFromRecurrenceLines(lines){
  if(!Array.isArray(lines)) return 'none';
  const joined = lines.join('\n').toUpperCase();
  if(joined.includes('FREQ=MONTHLY')) return 'monthly';
  if(joined.includes('FREQ=YEARLY')) return 'yearly';
  return 'none';
}
function isGoogleRepeatEvent(item){
  if(!item || item.type !== 'event' || item.source !== 'google') return false;
  if(item.recurringEventId) return true;
  if(normalizeRepeatValue(item.repeat) !== 'none') return true;
  if(Array.isArray(item.recurrence) && item.recurrence.some(r=>String(r).toUpperCase().includes('RRULE'))) return true;
  return false;
}
function isGoogleLinkedItem(item){
  return !!(item && item.source === 'google' && item.gId);
}
function makeIncomingOrderAllocator(){
  const cursor = {};
  return function(date){
    if(cursor[date] == null){
      const vals = Object.entries(S.orderMap||{})
        .filter(([k])=>k.startsWith(date+'|'))
        .map(([,v])=>v)
        .filter(v=>Number.isFinite(v));
      cursor[date] = vals.length ? Math.max(...vals)+1 : 0;
    }
    return cursor[date]++;
  };
}
function isMonthTaggedGoogleEvent(item){
  if(!(item && item.source==='google' && item.type==='event' && item.date && item.time==='00:00')) return false;
  const d = parseDs(item.date);
  return !!(d && d.getDate()===1 && hasMonthTag(item.rawTitle || item.title));
}
function isMonthLevelItem(item){
  if(item.monthOnly) return true;
  // Google에서 직접 만든 월 단위 항목 규칙:
  // 1일 00:00 + 제목에 [이달] 포함 → 월 헤더 아래 표시
  // 할일은 절대 월 헤더 아래 안 감
  if(isMonthTaggedGoogleEvent(item)) return true;
  return false;
}

function getMonthItems(y,m){
  const k=fmtMo(y,m);
  return S.items.filter(i=>{
    if(!i.date) return false;
    if(i.monthOnly && i.date===k) return true;
    // Google 1일 00:00 items for this month
    if(i.source==='google' && i.date.startsWith(k) && isMonthLevelItem(i)) return true;
    return false;
  }).sort(itemCompare);
}
function itemStableKey(item){
  if(item.gId) return `${item.source||'google'}:${item.type}:${item.gId}`;
  return `local:${item.id}`;
}
function itemOrderMapKey(item, dateOverride){
  return `${dateOverride||item._displayDate||item.date}|${itemStableKey(item)}`;
}
function getSavedOrder(item, dateOverride){
  const key = itemOrderMapKey(item, dateOverride);
  const v = S.orderMap ? S.orderMap[key] : undefined;
  return Number.isFinite(v) ? v : null;
}
function setSavedOrder(item, order, dateOverride){
  if(!S.orderMap) S.orderMap = {};
  S.orderMap[itemOrderMapKey(item, dateOverride)] = order;
  item.manualOrder = order;
}
function defaultItemCompare(a,b){
  if(a.type!==b.type) return a.type==='event' ? -1 : 1;
  const at=a.time||'', bt=b.time||'';
  if(at&&!bt) return -1; if(!at&&bt) return 1;
  const tc = at.localeCompare(bt);
  if(tc) return tc;
  return (a.title||'').localeCompare(b.title||'');
}
function itemCompare(a,b){
  const da = a._displayDate || a.date || '', db = b._displayDate || b.date || '';
  const dc = da.localeCompare(db);
  if(dc) return dc;
  const ao = getSavedOrder(a), bo = getSavedOrder(b);
  if(ao!=null && bo!=null) return ao-bo;
  if(ao!=null) return -1;
  if(bo!=null) return 1;
  if(a.manualOrder!=null && b.manualOrder!=null) return a.manualOrder-b.manualOrder;
  if(a.manualOrder!=null) return -1;
  if(b.manualOrder!=null) return 1;
  return defaultItemCompare(a,b);
}
function persistOrderForDate(date){
  // 날짜별 순서뿐 아니라 월헤더(YYYY-MM) 아래 항목 순서도 로컬에 보존한다.
  const arr = S.items.filter(i=>i.date===date).sort((a,b)=>{
    const ai = S.items.indexOf(a), bi = S.items.indexOf(b);
    return ai-bi;
  });
  arr.forEach((i,idx)=>setSavedOrder(i,idx,date));
}
function nextOrderForDate(date){
  const vals = S.items.filter(i=>i.date===date)
    .map(i=>getSavedOrder(i,date))
    .filter(v=>v!=null);
  return vals.length ? Math.max(...vals)+1 : 0;
}
function getDayItems(y,m){
  const p=fmtMo(y,m);
  const first = `${p}-01`;
  const last = fmtDs(y,m,new Date(y,m+1,0).getDate());
  const out=[];
  S.items.forEach(i=>{
    if(isMonthLevelItem(i) || !i.date) return;
    if(isRangeItem(i)){
      if(i.endDate < first || i.date > last) return;
      const start = i.date > first ? i.date : first;
      const end = i.endDate < last ? i.endDate : last;
      let d=parseDs(start); const e=parseDs(end);
      while(d && e && d<=e){
        out.push(cloneForDisplayDate(i, fmtDs(d.getFullYear(),d.getMonth(),d.getDate())));
        d.setDate(d.getDate()+1);
      }
    } else if(i.date.startsWith(p)) out.push(i);
  });
  return out.sort(itemCompare);
}
function getForDate(ds){
  return S.items.filter(i=>!isMonthLevelItem(i)&&isDateWithinRange(i,ds)).map(i=>cloneForDisplayDate(i,ds)).sort(itemCompare);
}

function toggleDone(id,e){
  e&&e.stopPropagation();
  const it=S.items.find(i=>i.id===id); if(!it)return;
  it.done=!it.done;
  if(it.type==='event') setStoredEventDone(it, it.done);
  if(it.type==='task' && it.gId) it.pendingDoneSync = true;
  save();
  // push to Google Tasks. If token expired, silently refresh first.
  // If silent refresh fails, keep pendingDoneSync=true and push it on next login/sync.
  if(it.type==='task' && it.gId){
    gEnsureConnected().then(async ok=>{
      if(!ok){ showToast('체크 저장됨 · 구글은 로그인 후 반영'); return; }
      const pushed = await gPatchTask(it);
      if(pushed){
        it.pendingDoneSync = false;
        save();
      } else {
        it.pendingDoneSync = true;
        save();
        showToast('체크 저장됨 · 다음 동기화 때 재시도');
      }
    });
  }
  // events don't have done status in Google, so event check is local-only.
  // update in place
  const row=e?.target?.closest('.item-row');
  if(row){
    row.classList.toggle('done', it.done);
    const cb=row.querySelector('.cb');
    if(cb) cb.classList.toggle('checked', it.done);
  } else {
    renderAllPreserveScroll();
  }
}
function renderAllPreserveScroll(){
  const el=document.getElementById('viewList');
  const scrollY=el?el.scrollTop:0;
  renderAll();
  requestAnimationFrame(()=>{ if(el) el.scrollTop=scrollY; });
}
function toggleDetail(id){ document.getElementById('detail_'+id)?.classList.toggle('open'); }
async function deleteItemWithConfirm(item, afterClose){
  if(!item) return;
  if(isGoogleRepeatEvent(item)){
    showToast('반복 일정은 Google Calendar에서 삭제해주세요');
    if(typeof afterClose === 'function') afterClose();
    return;
  }

  const linked = isGoogleLinkedItem(item);
  const msg = linked
    ? '이 항목을 Google에서도 삭제할까요?'
    : '삭제할까요?';
  if(!confirm(msg)) return;

  S.items = S.items.filter(i=>i.id!==item.id);
  save();
  if(typeof afterClose === 'function') afterClose();
  renderAll();

  if(linked){
    queuePendingDelete(item);
    const okConn = await gEnsureConnected();
    if(okConn){
      const ok = item.type === 'event'
        ? await gDeleteEvent(item.gId)
        : await gDeleteTask(item.gId, item.gListId);
      if(ok){
        const remain = getPendingDeletes().filter(d => !(d.gId === item.gId && d.type === item.type));
        savePendingDeletes(remain);
        showToast('Google에서도 삭제됨');
      } else {
        showToast('로컬 삭제됨 · Google 삭제는 다음 동기화 때 재시도');
      }
    } else {
      showToast('로컬 삭제됨 · 로그인 후 Google 삭제 재시도');
    }
  } else {
    showToast('Deleted');
  }
}

async function confirmDelete(id){
  const item = S.items.find(i=>i.id===id);
  await deleteItemWithConfirm(item);
}

function makeItemRow(item){

    detailEl = d;
  }

  };

  const more=document.createElement('button');

    if(isGoogleRepeatEvent(item)){
      showToast('반복 일정은 Google Calendar에서 수정해주세요');
      return;
    }
    openEditModal(item.id);
  };
  row.appendChild(more);

  // drag events for reorder across any date
  row.addEventListener('dragstart',e=>{
    e.dataTransfer.setData('text/plain', item.id);
    e.dataTransfer.effectAllowed='move';
    setTimeout(()=>row.classList.add('dragging'),0);
  });
  row.addEventListener('dragend',()=>{
    row.classList.remove('dragging');
    document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(el=>
      el.classList.remove('drag-over-top','drag-over-bottom'));
  });
  row.addEventListener('dragover',e=>{
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(el=>

    const rect=row.getBoundingClientRect();

  });
  row.addEventListener('dragleave',e=>{

      row.classList.remove('drag-over-top','drag-over-bottom');
  });
  row.addEventListener('drop',e=>{
    e.preventDefault();
    row.classList.remove('drag-over-top','drag-over-bottom');

    if(fromId===item.id) return;
    const fromItem=S.items.find(i=>i.id===fromId);
    if(!fromItem) return;
    if(isRangeItem(fromItem)){ showToast('기간 일정은 드래그 이동할 수 없어요'); return; }
    const targetIsMonthLevel = isMonthLevelItem(item);
    const targetDate = item.date;
    if(fromItem.type==='task' && targetIsMonthLevel){
      showToast('할일은 월헤더로 이동할 수 없어요');
      return;
    }
    if(isGoogleRepeatEvent(fromItem) && (fromItem.date !== targetDate || !!fromItem.monthOnly !== !!targetIsMonthLevel)){
      showToast('반복 일정 날짜 이동은 Google Calendar에서 해주세요');
      return;
    }

    // move to this item's date/month. If converting to/from 월헤더, preserve the original time locally.
    const oldDate = fromItem.date;
    const oldMonthOnly = !!fromItem.monthOnly;
    if(targetIsMonthLevel){
      moveItemToMonthOnly(fromItem, targetDate);
    } else {
      moveItemToExactDate(fromItem, targetDate);
    }
    const dateChanged = oldDate !== fromItem.date || oldMonthOnly !== !!fromItem.monthOnly;

    // determine insert position in S.items
    const rect=row.getBoundingClientRect();
    const after=e.clientY>=rect.top+rect.height/2;

    // remove from current position
    S.items.splice(S.items.findIndex(i=>i.id===fromId),1);
    // insert near target
    const targetIdx=S.items.findIndex(i=>i.id===item.id);
    S.items.splice(targetIdx+(after?1:0),0,fromItem);

    // 사용자가 웹앱에서 정한 순서는 로컬에 영구 저장하고, 동기화로 덮어쓰지 않음
    persistOrderForDate(item.date);

    save(); renderAll();
    if(dateChanged) gPushDateChange(fromItem);
  });

  // no long-press delete - data managed in Google Calendar

  return row;
}


function makeDayBlock(dateStr,items){
  const d=parseDs(dateStr); const dow=d.getDay(); const isToday=dateStr===TODAYSTR;
  const block=document.createElement('div');
  block.className='day-block'; block.id='day_'+dateStr;

  hdr.innerHTML=`<span class="day-num-big ${isToday?'today-num':''}">${d.getDate()}</span><span class="day-name ${dow===0?'sun':dow===6?'sat':''}">${DAYS_EN[dow].toUpperCase()}${isToday?' · Today':''}</span>`;

  // allow drop onto day header to move item to this date (appended at end)
  hdr.addEventListener('dragover',e=>{ e.preventDefault(); hdr.style.background='var(--surface2)'; });
  hdr.addEventListener('dragleave',()=>{ hdr.style.background=''; });
  hdr.addEventListener('drop',e=>{
    e.preventDefault(); hdr.style.background='';

    const fromItem=S.items.find(i=>i.id===fromId); if(!fromItem) return;
    if(isRangeItem(fromItem)){ showToast('기간 일정은 드래그 이동할 수 없어요'); return; }
    if(isGoogleRepeatEvent(fromItem) && (fromItem.date !== dateStr || !!fromItem.monthOnly)){
      showToast('반복 일정 날짜 이동은 Google Calendar에서 해주세요');
      return;
    }
    const oldDate = fromItem.date;
    const oldMonthOnly = !!fromItem.monthOnly;
    moveItemToExactDate(fromItem, dateStr);
    const dateChanged = oldDate !== fromItem.date || oldMonthOnly !== !!fromItem.monthOnly;
    setSavedOrder(fromItem, nextOrderForDate(dateStr), dateStr);

// ── LIST ──
function getRelevantListTarget(){
  const todayTime = parseDs(TODAYSTR).getTime();
  const candidates = S.items
    .filter(i=>i.date)
    .map(i=>{
      const ds = i.monthOnly && i.date.length===7 ? i.date + '-01' : i.date;
      const d = parseDs(ds);
      if(!d) return null;
      return { ds, time:d.getTime(), monthOnly:!!i.monthOnly };
    })
    .filter(Boolean);

  if(candidates.some(c=>c.ds===TODAYSTR)) return { ds:TODAYSTR, year:TODAY.getFullYear(), month:TODAY.getMonth(), exact:true };

  const future = candidates.filter(c=>c.time>=todayTime).sort((a,b)=>a.time-b.time)[0];
  const past = candidates.filter(c=>c.time<todayTime).sort((a,b)=>b.time-a.time)[0];
  const chosen = future || past;
  if(chosen){
    const d=parseDs(chosen.ds);
    return { ds:chosen.ds, year:d.getFullYear(), month:d.getMonth(), exact:!chosen.monthOnly };
  }
  return { ds:TODAYSTR, year:TODAY.getFullYear(), month:TODAY.getMonth(), exact:false };
}

function scrollToRelevantListTarget(){
  const target = getRelevantListTarget();
  if(!target) return;
  const dayEl = target.exact ? document.getElementById('day_'+target.ds) : null;
  if(dayEl){
    dayEl.scrollIntoView({behavior:'auto', block:'start'});
    return;
  }
  const monthEl = document.getElementById(`month_${target.year}_${target.month}`);
  if(monthEl) monthEl.scrollIntoView({behavior:'auto', block:'start'});
}


function monthDoneArchiveKey(y,m){ return `${y}-${String(m+1).padStart(2,'0')}`; }
function isPastFullyDoneDate(ds, items){
  if(!ds || ds >= TODAYSTR) return false;
  if(!items || !items.length) return false;
  return items.every(i=>effectiveDone(i));
}

    // 숨길 완료 날짜가 없는 달도 버튼은 보이게 두어 월헤더 UI가 흔들리지 않게 한다.

    }
    if(!dayItems.length&&!monthItems.length){
      const e=document.createElement('div'); e.className='empty-month'; e.textContent='—';
      block.appendChild(e);
    } else {
      allDates.forEach(ds=>{

function renderCal(){
  document.getElementById('calMonthLabel').textContent=MONTHS_SHORT[S.calMonth];
  document.getElementById('calYearLabel').textContent=S.calYear;
  const container=document.getElementById('calDays'); container.innerHTML='';
  const first=new Date(S.calYear,S.calMonth,1), startDay=first.getDay();
  const dim=new Date(S.calYear,S.calMonth+1,0).getDate();
  const dip=new Date(S.calYear,S.calMonth,0).getDate();
  let cells=[];
  for(let i=startDay-1;i>=0;i--) cells.push({d:dip-i,m:S.calMonth-1,y:S.calYear,other:true});
  for(let d=1;d<=dim;d++) cells.push({d,m:S.calMonth,y:S.calYear,other:false});
  while(cells.length%7!==0) cells.push({d:cells.length-dim-startDay+1,m:S.calMonth+1,y:S.calYear,other:true});
  cells.forEach(c=>{
    const rm=((c.m%12)+12)%12, ry=c.y+Math.floor(c.m/12);
    const ds=fmtDs(ry,rm,c.d);
    const isToday=ds===TODAYSTR, isSel=S.selDate===ds, dow=new Date(ry,rm,c.d).getDay();
    const dayItems=getForDate(ds);
    const rangeItems=dayItems.filter(item=>isRangeItem(item));
    const normalItems=dayItems.filter(item=>!isRangeItem(item));
    const cell=document.createElement('div');
    cell.className=`cal-day${c.other?' other':''}${isToday?' today':''}${isSel?' selected':''}${dow===0?' sun':dow===6?' sat':''}`;
    cell.onclick=()=>selectCalDate(ds);
    const dn=document.createElement('div'); dn.className='dn'; dn.textContent=c.d; cell.appendChild(dn);
    if(rangeItems.length){
      rangeItems.slice(0,2).forEach(item=>{
        const bar=document.createElement('div');
        const isStart=ds===item.date;
        const isEnd=ds===item.endDate;
        bar.className=`cal-range-bar ${isStart?'range-start':'range-mid'} ${isEnd?'range-end':''}`;
        bar.title=`${item.title} (${rangeLabel(item)})`;
        // 월 중간부터 보이는 기간 일정은 1일 칸에도 제목을 보여준다.
        bar.textContent=(isStart || c.d===1) ? item.title : '';
        cell.appendChild(bar);
      });
    }
    if(normalItems.length){
      const dots=document.createElement('div'); dots.className='cal-dots';
      normalItems.slice(0,5).forEach(item=>{const dot=document.createElement('div');dot.className=`dot ${item.type==='event'?'dot-ev':'dot-tk'}`;dots.appendChild(dot);});
      cell.appendChild(dots);
      const chip=document.createElement('div'); chip.className='cal-chip-text';
      chip.textContent=(normalItems[0].time?normalItems[0].time+' ':'')+normalItems[0].title;
      cell.appendChild(chip);
    }
    container.appendChild(cell);
  });
  if(S.selDate) renderDayDetail(S.selDate);
}
function selectCalDate(ds){
  S.selDate=ds; const d=parseDs(ds); S.calYear=d.getFullYear(); S.calMonth=d.getMonth(); renderCal();
}
function renderDayDetail(ds){
  const panel=document.getElementById('dayDetail');
  const items=getForDate(ds);
  panel.innerHTML=`<div class="dd-header">${fmtLabel(ds)}</div>`;
  if(!items.length){panel.innerHTML+='<div class="dd-empty">Nothing scheduled</div>';return;}
  items.forEach(item=>panel.appendChild(makeItemRow(item)));

function changeCalMonth(d){
  S.calMonth+=d;
  if(S.calMonth<0){S.calMonth=11;S.calYear--;} if(S.calMonth>11){S.calMonth=0;S.calYear++;}
  renderCal();
}

function initCalSwipe(){
  const el = document.getElementById('viewCal');
  if(!el || el.dataset.swipeReady==='1') return;
  el.dataset.swipeReady = '1';
  let sx=0, sy=0, st=0;
  el.addEventListener('touchstart', e=>{
    if(!e.touches || e.touches.length!==1) return;
    const t=e.touches[0];
    sx=t.clientX; sy=t.clientY; st=Date.now();
  }, {passive:true});
  el.addEventListener('touchend', e=>{
    if(document.querySelector('.modal-overlay.open')) return;
    const t=e.changedTouches && e.changedTouches[0];
    if(!t) return;
    const dx=t.clientX-sx, dy=t.clientY-sy;
    const elapsed=Date.now()-st;
    if(elapsed>900) return;
    if(Math.abs(dx)<55 || Math.abs(dx)<Math.abs(dy)*1.35) return;
    if(dx<0) changeCalMonth(1);
    else changeCalMonth(-1);
  }, {passive:true});
}

      }

    handle.addEventListener('touchend',()=>{touchId=null;});
    list.appendChild(card);
  });

    bar.classList.add('open'); showViewEl('search'); document.getElementById('fabBtn').classList.add('hidden'); doSearch('');
    setTimeout(()=>document.getElementById('searchInput').focus(),80);
  } else closeSearch();
}
function closeSearch(){
  document.getElementById('searchBar').classList.remove('open');
  document.getElementById('searchInput').value=''; switchView(prevView);
}
function doSearch(q){
  const c=document.getElementById('searchResults'); c.innerHTML='';
  if(!q.trim()){c.innerHTML='<div class="sr-empty">Start typing...</div>';return;}
  const low=q.toLowerCase();
  const results=[
    ...S.items.filter(i=>i.title.toLowerCase().includes(low)||(i.note||'').toLowerCase().includes(low)).map(i=>({...i,_type:'item'})),
    ...S.memos.filter(m=>m.title.toLowerCase().includes(low)||m.body.toLowerCase().includes(low)).map(m=>({...m,_type:'memo'})),
  ].sort((a,b)=>(b.updated||b.date||'').localeCompare(a.updated||a.date||''));
  if(!results.length){c.innerHTML='<div class="sr-empty">No results</div>';return;}
  function hl(t){return t.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);}
  results.forEach(r=>{
    const el=document.createElement('div'); el.className='sr-item';
    if(r._type==='memo'){
      el.innerHTML=`<div class="sr-date">Memo</div><div class="sr-title">${hl(r.title||'제목 없음')}</div><div class="sr-note">${hl((r.body||'').slice(0,60))}</div>`;
      el.onclick=()=>{closeSearch();switchView('memo');openMemoEditor(r.id);};
    } else {
      el.innerHTML=`<div class="sr-date">${fmtLabel(r.date)}</div><div class="sr-title">${hl(r.title)}</div>${r.note?`<div class="sr-note">${hl(r.note)}</div>`:''}`;
      el.onclick=()=>{closeSearch();if(r.monthOnly){S.listYear=parseInt(r.date);switchView('list');}else{selectCalDate(r.date);switchView('cal');}};
    }
    c.appendChild(el);
  });
}

// 발급: console.cloud.google.com → 새 프로젝트 → API 및 서비스 → 사용자 인증 정보 → OAuth 2.0 클라이언트 ID
const GOOGLE_CLIENT_ID = '377968944315-nbmoj75ki5ob0ct8v05f68fs013uadr0.apps.googleusercontent.com';
const GOOGLE_SCOPES = [
  'https://www.googleapis.com/auth/calendar.events',
  'https://www.googleapis.com/auth/tasks',
].join(' ');

let G = {
  token: localStorage.getItem('g_token') || '',
  email: localStorage.getItem('g_email') || '',
  expiry: parseInt(localStorage.getItem('g_expiry') || '0'),
};

function isGConnected(){ return !!(G.token && Date.now() < G.expiry); }

function gTrySilentRefresh(){
  return new Promise(resolve=>{
    if(!G.email){ resolve(false); return; }
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    const params = new URLSearchParams({
      client_id: GOOGLE_CLIENT_ID,
      redirect_uri: 'https://dreameet01.github.io/MyPlanner/',
      response_type: 'token',
      scope: GOOGLE_SCOPES,
      prompt: 'none',
      login_hint: G.email,
    });
    let done = false;
    const finish = ok=>{
      if(done) return;
      done = true;
      try { document.body.removeChild(iframe); } catch(e){}
      resolve(ok);
    };
    iframe.onload = ()=>{
      try {
        const hash = iframe.contentWindow.location.hash.slice(1);
        const p = new URLSearchParams(hash);
        const token = p.get('access_token');
        const expiresIn = parseInt(p.get('expires_in')||'3600');
        if(token){
          G.token = token;
          G.expiry = Date.now() + expiresIn*1000;
          localStorage.setItem('g_token', token);
          localStorage.setItem('g_expiry', String(G.expiry));
          renderAcctPanel();
          gScheduleRefresh();
          finish(true);
          return;
        }
      } catch(e){}
      finish(false);
    };
    iframe.onerror = ()=>finish(false);
    iframe.src = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
    document.body.appendChild(iframe);
    setTimeout(()=>finish(false), 6000);
  });
}

async function gEnsureConnected(){
  if(isGConnected()) return true;
  return await gTrySilentRefresh();
}

// 토큰 만료 10분 전에 자동 갱신
function gScheduleRefresh(){
  const remaining = G.expiry - Date.now() - 10*60*1000; // 만료 10분 전
  if(remaining <= 0){ gTrySilentRefresh(); return; }
  setTimeout(()=>{ gTrySilentRefresh(); }, remaining);
}

function gHandleRedirect(){
  const hash = location.hash.slice(1);
  if(!hash) return;
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  const expiresIn = parseInt(params.get('expires_in') || '3600');
  if(!token) return;
  G.token = token;
  G.expiry = Date.now() + expiresIn*1000;
  localStorage.setItem('g_token', token);
  localStorage.setItem('g_expiry', G.expiry);
  // clean URL
  history.replaceState(null,'',location.pathname+location.search);
  // schedule auto refresh
  gScheduleRefresh();
  // fetch email
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers:{Authorization:`Bearer ${token}`}
  }).then(r=>r.json()).then(d=>{
    G.email = d.email||'';
    localStorage.setItem('g_email', G.email);

async function gFetchCalendar(){
  const now = new Date();
  const twoYearsAgo = new Date(now.getFullYear()-2,0,1).toISOString();
  // 반복 일정이 다음 해 이후에도 보이도록 충분히 넓게 가져온다.
  const tenYearsAhead = new Date(now.getFullYear()+10,11,31).toISOString();

  // 1) 반복 원본(master)을 먼저 가져와서 RRULE을 파악한다.
  const masterRes = await fetch(
    `https://www.googleapis.com/calendar/v3/calendars/primary/events?`+
    `singleEvents=false&showDeleted=false&maxResults=2500`,
    {headers:{Authorization:`Bearer ${G.token}`}}
  );
  if(!masterRes.ok) throw new Error('캘린더 오류 '+masterRes.status);
  const masterData = await masterRes.json();
  const repeatMap = {};
  (masterData.items||[]).forEach(e=>{
    const r = repeatFromRecurrenceLines(e.recurrence);
    if(r !== 'none') repeatMap[e.id] = r;
  });

  // 2) 화면 표시용으로 반복 인스턴스를 펼쳐서 가져온다.
  const res = await fetch(
    `https://www.googleapis.com/calendar/v3/calendars/primary/events?`+
    `timeMin=${twoYearsAgo}&timeMax=${tenYearsAhead}&singleEvents=true&orderBy=startTime&maxResults=2500`,
    {headers:{Authorization:`Bearer ${G.token}`}}
  );
  if(!res.ok) throw new Error('캘린더 오류 '+res.status);
  const data = await res.json();
  const incoming = (data.items||[]).map(e=>{
    const rawTitle = e.summary || '(제목 없음)';
    const rawDate = (e.start.date||e.start.dateTime||'').slice(0,10);
    const rawTime = e.start.dateTime ? e.start.dateTime.slice(11,16) : '';
    const allDayEnd = e.start.date && e.end?.date ? prevDayStr(e.end.date) : '';
    const isMultiDayRange = !!(e.start.date && allDayEnd && allDayEnd > rawDate);
    const d = parseDs(rawDate);
    const taggedMonth = !!(hasMonthTag(rawTitle) && d && d.getDate()===1 && rawTime==='00:00');
    const oldItem = S.items.find(i=>i.type==='event' && i.gId===e.id);
    const googleRepeat = repeatMap[e.recurringEventId || e.id] || 'none';
    if(oldItem?.pendingUpdateSync){
      return {
        id:'gev_'+e.id, gId:e.id, type:'event',
        recurringEventId:e.recurringEventId || '',
        rawTitle: oldItem.rawTitle || rawTitle,
        title: oldItem.title,
        date: oldItem.date,
        endDate: oldItem.endDate || '',
        isRange: !!oldItem.isRange,
        time: oldItem.time || '',
        _monthBackupTime: oldItem._monthBackupTime || '',
        note: oldItem.note || '',
        done: getStoredEventDone({type:'event', id:'gev_'+e.id, gId:e.id, recurringEventId:e.recurringEventId||'', rawTitle:oldItem.rawTitle||rawTitle, title:oldItem.title||rawTitle, date:oldItem.date||rawDate}, !!oldItem.done),
        repeat: normalizeRepeatValue(oldItem.repeat || googleRepeat),
        recurrence:e.recurrence || oldItem.recurrence || [],
        pendingDateSync: !!oldItem.pendingDateSync,
        pendingUpdateSync: true,
        monthOnly: !!oldItem.monthOnly,
        source:'google',
      };
    }
    return {
      id:'gev_'+e.id, gId:e.id, type:'event',
      recurringEventId:e.recurringEventId || '',
      rawTitle,
      title: taggedMonth ? stripMonthTag(rawTitle) : rawTitle,
      date: oldItem?.pendingDateSync ? oldItem.date : (taggedMonth ? monthKeyFromDate(rawDate) : rawDate),
      endDate: oldItem?.pendingDateSync ? (oldItem.endDate||'') : (isMultiDayRange ? allDayEnd : ''),
      isRange: oldItem?.pendingDateSync ? !!oldItem.isRange : !!isMultiDayRange,
      time: oldItem?.pendingDateSync ? (oldItem.time||'') : (taggedMonth || isMultiDayRange ? '' : rawTime),
      _monthBackupTime: oldItem?._monthBackupTime || '',
      note:e.description||'',
      repeat: normalizeRepeatValue(googleRepeat || oldItem?.repeat),
      recurrence:e.recurrence || oldItem?.recurrence || [],
      // Google Calendar에는 완료 체크 상태가 없어서 웹앱 로컬 상태를 별도 맵에서 보존한다.
      done: getStoredEventDone({type:'event', id:'gev_'+e.id, gId:e.id, recurringEventId:e.recurringEventId||'', rawTitle, title:taggedMonth ? stripMonthTag(rawTitle) : rawTitle, date:taggedMonth ? monthKeyFromDate(rawDate) : rawDate}, !!oldItem?.done),
      pendingDateSync: !!oldItem?.pendingDateSync,
      pendingUpdateSync: false,
      monthOnly: oldItem?.pendingDateSync ? !!oldItem.monthOnly : taggedMonth,
      source:'google',
    };
  }).filter(e=>e.date);
  // 기존 사용자가 조정한 순서는 gId+date 기준으로 보존
  // 새로 들어온 항목은 날짜별로 겹치지 않는 순서를 순차 부여
  const nextIncomingOrder = makeIncomingOrderAllocator();
  const mergedEvents = incoming.map(newItem=>{
    const saved = getSavedOrder(newItem, newItem.date);
    if(saved != null) newItem.manualOrder = saved;
    else newItem.manualOrder = nextIncomingOrder(newItem.date);
    return newItem;
  });

  // 동기화 직후에도 체크된 Google 일정 상태를 로컬 맵에 다시 저장해 다음 동기화에서 풀리지 않게 한다.
  mergedEvents.forEach(ev=>{ if(ev.done) setStoredEventDone(ev, true); });
  S.items = [
    ...S.items.filter(i=>i.source!=='google'||i.type!=='event'),
    ...mergedEvents,
  ];
  restoreStoredEventDoneToItems();
}


async function gFetchTasks(){
  const tlRes = await fetch('https://tasks.googleapis.com/tasks/v1/users/@me/lists',
    {headers:{Authorization:`Bearer ${G.token}`}});
  if(!tlRes.ok) throw new Error('Tasks 오류 '+tlRes.status);
  const tlData = await tlRes.json();
  const incoming = [];

  for(const list of (tlData.items||[])){
    const tRes = await fetch(
      `https://tasks.googleapis.com/tasks/v1/lists/${list.id}/tasks?showCompleted=true&showHidden=true&maxResults=1000`,
      {headers:{Authorization:`Bearer ${G.token}`}}
    );
    if(!tRes.ok) continue;

    const tData = await tRes.json();

    for(const t of (tData.items||[])){
      if(!t.due) continue;
      const dueDate = t.due.slice(0,10);
      // 할일은 시간 표시 없음 - 무조건 해당 날짜에만 표시
      const oldItem = S.items.find(i=>i.type==='task' && i.gId===t.id);
      incoming.push({
        id:'gtk_'+t.id,
        gId:t.id,
        gListId:list.id,
        type:'task',
        title: oldItem?.pendingUpdateSync ? oldItem.title : (t.title||''),
        date: (oldItem?.pendingUpdateSync || oldItem?.pendingDateSync) ? oldItem.date : dueDate,
        time:'',
        note: oldItem?.pendingUpdateSync ? (oldItem.note||'') : (t.notes||''),
        // If a checkbox change is waiting to be pushed, keep the local desired state.
        done: (oldItem?.pendingUpdateSync || oldItem?.pendingDoneSync) ? oldItem.done : (t.status==='completed'),
        pendingDoneSync: !!oldItem?.pendingDoneSync,
        pendingDateSync: !!oldItem?.pendingDateSync,
        pendingUpdateSync: !!oldItem?.pendingUpdateSync,
        monthOnly:false,
        source:'google',
      });
    }
  }

  // 기존 사용자가 조정한 순서는 gId+date 기준으로 보존
  // 새로 들어온 항목은 날짜별로 겹치지 않는 순서를 순차 부여
  const nextIncomingOrder = makeIncomingOrderAllocator();
  const mergedItems = incoming.map(newItem=>{
    const saved = getSavedOrder(newItem, newItem.date);
    if(saved != null){
      newItem.manualOrder = saved;
    } else {
      setSavedOrder(newItem, nextIncomingOrder(newItem.date), newItem.date);
    }
    return newItem;
  });

  S.items = [
    ...S.items.filter(i=>i.source!=='google'||i.type!=='task'),
    ...mergedItems,
  ];
}

// patch task done status back to Google
async function gPatchTask(item){
  if(!isGConnected()||!item.gId||!item.gListId) return false;
  try {
    const res = await fetch(
      `https://tasks.googleapis.com/tasks/v1/lists/${item.gListId}/tasks/${item.gId}`,
      { method:'PATCH',
        headers:{Authorization:`Bearer ${G.token}`,'Content-Type':'application/json'},
        body:JSON.stringify({status:item.done?'completed':'needsAction'})
      }
    );
    return res.ok;
  } catch(e){
    return false;
  }
}

async function gFlushPendingTaskUpdates(){
  if(!isGConnected()) return false;
  const pending = S.items.filter(i=>i.type==='task' && i.gId && i.gListId && i.pendingDoneSync);
  if(!pending.length) return true;
  let allOk = true;
  for(const item of pending){
    const ok = await gPatchTask(item);
    if(ok) item.pendingDoneSync = false;
    else allOk = false;
  }
  save();
  return allOk;
}

// Pending Google deletions are stored outside S.items because the local item is removed immediately.
function getPendingDeletes(){
  try {
    const arr = JSON.parse(localStorage.getItem('pl_pending_deletes') || '[]');
    return Array.isArray(arr) ? arr : [];
  } catch(e){
    return [];
  }
}
function savePendingDeletes(arr){
  try {
    localStorage.setItem('pl_pending_deletes', JSON.stringify(Array.isArray(arr) ? arr : []));
  } catch(e){}
}
function queuePendingDelete(item){
  if(!item || !item.gId) return;
  const arr = getPendingDeletes();
  const exists = arr.some(d => d.gId === item.gId && d.type === item.type);
  if(!exists){
    arr.push({ type:item.type, gId:item.gId, gListId:item.gListId || '', queuedAt:Date.now() });
    savePendingDeletes(arr);
  }
}

async function gFlushPendingDeletes(){
  if(!isGConnected()) return false;
  const arr = getPendingDeletes();
  if(!arr.length) return true;
  const remain = [];
  for(const d of arr){
    let ok = false;
    if(d.type === 'event') ok = await gDeleteEvent(d.gId);
    else if(d.type === 'task') ok = await gDeleteTask(d.gId, d.gListId);
    if(!ok) remain.push(d);
  }
  savePendingDeletes(remain);
  return remain.length===0;
}

// Get or create default task list id

// Create event on Google Calendar
async function gCreateEvent(item, localId){
  if(!isGConnected()) return false;
  // 중복 방지: 이미 gId 있으면 스킵
  const localItem = localId ? S.items.find(i=>i.id===localId) : item;
  if(localItem?.gId) return true;
  try {
    const body = { summary: item.title, description: item.note||'' };
    const isMonth = item.monthOnly || hasMonthTag(item.title);
    if(isRangeItem(item)){
      body.start = {date: item.date};
      body.end   = {date: nextDayStr(item.endDate)};
    } else if(isMonth){
      const mDate = item.date && item.date.length===7 ? firstDayOfMonth(item.date) : item.date;
      const dt = mDate + 'T00:00:00';
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      body.summary = hasMonthTag(item.title) ? item.title : `${MONTH_TAG} ${item.title}`;
      body.start = {dateTime: dt, timeZone: tz};
      body.end   = {dateTime: addMinutesToLocalDateTime(mDate, '00:00', 1), timeZone: tz};
    } else if(item.time){
      const dt = item.date + 'T' + item.time + ':00';
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      body.start = {dateTime: dt, timeZone: tz};
      body.end   = {dateTime: addMinutesToLocalDateTime(item.date, item.time, 60), timeZone: tz};
    } else {
      body.start = {date: item.date};
      body.end   = {date: nextDayStr(item.date)};
    }
    const rec = isRangeItem(item) ? null : recurrenceForRepeat(item);
    if(rec) body.recurrence = rec;
    const res = await fetch(
      'https://www.googleapis.com/calendar/v3/calendars/primary/events',
      { method:'POST',
        headers:{Authorization:`Bearer ${G.token}`,'Content-Type':'application/json'},
        body: JSON.stringify(body)
      }
    );
    if(res.ok && localItem){
      const data = await res.json();
      localItem.gId = data.id;
      localItem.source = 'google';
      if(localItem.done) setStoredEventDone(localItem, true);
      save();
    }
    return res.ok;
  } catch(e){ return false; }
}

// Update event on Google Calendar
async function gUpdateEvent(item){
  if(!isGConnected()||!item.gId||item.type!=='event') return false;
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const isRecurringInstance = !!item.recurringEventId;
    const targetId = (isRecurringInstance && !item.pendingDateSync) ? item.recurringEventId : item.gId;

    const body = { summary: item.title, description: item.note||'' };

    // 반복 인스턴스에서 일반 수정/반복 수정은 시리즈 master에 반영한다.
    // 단, 날짜 드래그 이동(pendingDateSync)은 해당 인스턴스 날짜 변경으로 보고 instance에만 반영한다.
    if(isRecurringInstance && !item.pendingDateSync){
      const rec = isRangeItem(item) ? null : recurrenceForRepeat(item);
      body.recurrence = rec || [];
    } else {
      const isMonth = item.monthOnly || hasMonthTag(item.title);
      if(isRangeItem(item)){
        body.start = {date: item.date};
        body.end   = {date: nextDayStr(item.endDate)};
      } else if(isMonth){
        const mDate = item.date && item.date.length===7 ? firstDayOfMonth(item.date) : item.date;
        const dt = mDate + 'T00:00:00';
        body.summary = hasMonthTag(item.title) ? item.title : `${MONTH_TAG} ${item.title}`;
        body.start = {dateTime: dt, timeZone: tz};
        body.end   = {dateTime: addMinutesToLocalDateTime(mDate, '00:00', 1), timeZone: tz};
      } else if(item.time){
        const dt = item.date + 'T' + item.time + ':00';
        body.start = {dateTime: dt, timeZone: tz};
        body.end   = {dateTime: addMinutesToLocalDateTime(item.date, item.time, 60), timeZone: tz};
      } else {
        body.start = {date: item.date};
        body.end   = {date: nextDayStr(item.date)};
      }
      const rec = isRangeItem(item) ? null : recurrenceForRepeat(item);
      body.recurrence = rec || [];
    }

    const res = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/primary/events/${targetId}`,
      { method:'PATCH',
        headers:{Authorization:`Bearer ${G.token}`,'Content-Type':'application/json'},
        body: JSON.stringify(body)
      }
    );
    return res.ok;
  } catch(e){ return false; }
}

      { method:'DELETE', headers:{Authorization:`Bearer ${G.token}`} }
    );
    return res.ok || res.status===404;
  } catch(e){ return false; }
}


// ── INIT ──
window.addEventListener('load', function() {
  initBackGuard();
  load();
  if(S.items.length===0) seedDemo();
  applyTheme(currentTheme);
  buildThemePanel();
  renderAcctPanel();
  gHandleRedirect();
  switchView('list');
  initCalSwipe();
  initYearSwipe();

  // 토큰이 만료되어도 Google 로그인 세션이 살아있으면 조용히 새 토큰을 받아 계속 로그인처럼 유지
  if(G.email && !isGConnected()){
    gTrySilentRefresh().then(ok=>{ if(ok) gSync(); else renderAcctPanel(); });
  } else if(isGConnected()){
    gScheduleRefresh();
    gSync();
  }

  // 5분마다 자동 동기화 (화면 켜져있을때만)
  setInterval(async ()=>{
    if(document.hidden) return;
    if(await gEnsureConnected()){
      gFlushPendingDeletes().then(()=>gFlushPendingCreateUpdates()).then(()=>gFlushPendingTaskUpdates()).then(()=>gFlushPendingDateUpdates()).then(()=>gFlushPendingFullUpdates()).then(()=>gFetchCalendar()).then(()=>gFetchTasks()).then(()=>{
        save();
        if(S.curView==='list') renderList(false);
        else renderAll();
      }).catch(()=>{});
    }
  }, 5 * 60 * 1000);
});
</script>
